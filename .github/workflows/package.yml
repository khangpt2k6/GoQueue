name: Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version label (example: v1.0.0 or dev)"
        required: false
        default: dev
        type: string

permissions:
  contents: read

concurrency:
  group: package-${{ github.ref }}-${{ inputs.version }}
  cancel-in-progress: true

jobs:
  build-packages:
    name: Build Binary Packages
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate workspace
        run: go test ./...

      - name: Build package archives
        run: |
          mkdir -p dist
          TARGETS=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
          )

          for target in "${TARGETS[@]}"; do
            read -r GOOS GOARCH <<<"${target}"
            EXT=""
            ARCHIVE_EXT="tar.gz"
            if [[ "${GOOS}" == "windows" ]]; then
              EXT=".exe"
              ARCHIVE_EXT="zip"
            fi

            PKG_DIR="goqueue_${VERSION}_${GOOS}_${GOARCH}"
            mkdir -p "dist/${PKG_DIR}"

            GOOS="${GOOS}" GOARCH="${GOARCH}" go build -trimpath -ldflags "-s -w" -o "dist/${PKG_DIR}/broker${EXT}" ./cmd/broker
            GOOS="${GOOS}" GOARCH="${GOARCH}" go build -trimpath -ldflags "-s -w" -o "dist/${PKG_DIR}/goqueue${EXT}" ./cmd/goqueue
            if [[ -f README.md ]]; then cp README.md "dist/${PKG_DIR}/"; fi
            if [[ -f LICENSE ]]; then cp LICENSE "dist/${PKG_DIR}/"; fi

            if [[ "${ARCHIVE_EXT}" == "zip" ]]; then
              (cd dist && zip -qr "${PKG_DIR}.zip" "${PKG_DIR}")
            else
              tar -C dist -czf "dist/${PKG_DIR}.tar.gz" "${PKG_DIR}"
            fi
            rm -rf "dist/${PKG_DIR}"
          done

      - name: Create package checksums and summary
        run: |
          cd dist
          sha256sum goqueue_* > checksums.txt
          cat > PACKAGES.md <<EOF
          # GoQueue Packages (${VERSION})

          Included:
          - linux amd64, arm64
          - darwin amd64, arm64
          - windows amd64

          Verify:
          \`\`\`bash
          sha256sum -c checksums.txt
          \`\`\`
          EOF

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: goqueue-packages-${{ inputs.version }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            dist/PACKAGES.md
          retention-days: 14
