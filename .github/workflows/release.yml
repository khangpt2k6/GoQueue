name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (example: v1.0.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean
      mark_latest:
        description: "Mark this release as latest"
        required: false
        default: false
        type: boolean
      publish_docker:
        description: "Build and push broker image to GHCR"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate version tag
        run: |
          if [[ ! "${VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: ${VERSION}"
            echo "Expected format: vMAJOR.MINOR.PATCH (optional prerelease/build suffix)"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Build release archives
        run: |
          mkdir -p dist
          VERSION_NO_V="${VERSION#v}"
          TARGETS=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
          )

          for target in "${TARGETS[@]}"; do
            read -r GOOS GOARCH <<<"${target}"
            EXT=""
            ARCHIVE_EXT="tar.gz"
            if [[ "${GOOS}" == "windows" ]]; then
              EXT=".exe"
              ARCHIVE_EXT="zip"
            fi

            PKG_DIR="goqueue_${VERSION_NO_V}_${GOOS}_${GOARCH}"
            mkdir -p "dist/${PKG_DIR}"

            GOOS="${GOOS}" GOARCH="${GOARCH}" go build -trimpath -ldflags "-s -w" -o "dist/${PKG_DIR}/broker${EXT}" ./cmd/broker
            GOOS="${GOOS}" GOARCH="${GOARCH}" go build -trimpath -ldflags "-s -w" -o "dist/${PKG_DIR}/goqueue${EXT}" ./cmd/goqueue

            if [[ -f README.md ]]; then cp README.md "dist/${PKG_DIR}/"; fi
            if [[ -f LICENSE ]]; then cp LICENSE "dist/${PKG_DIR}/"; fi

            if [[ "${ARCHIVE_EXT}" == "zip" ]]; then
              (cd dist && zip -qr "${PKG_DIR}.zip" "${PKG_DIR}")
            else
              tar -C dist -czf "dist/${PKG_DIR}.tar.gz" "${PKG_DIR}"
            fi
            rm -rf "dist/${PKG_DIR}"
          done

      - name: Create checksums and release notes
        run: |
          cd dist
          sha256sum goqueue_* > checksums.txt
          cat > RELEASE_NOTES.md <<EOF
          ## GoQueue ${VERSION}

          ### Included binaries
          - broker (server)
          - goqueue (CLI client)

          ### Download
          Pick the archive for your platform and verify integrity:
          \`\`\`bash
          sha256sum -c checksums.txt
          \`\`\`

          ### Quick start
          \`\`\`bash
          ./broker --tcp-addr=:9090 --grpc-addr=:9095 --metrics-addr=:2112
          ./goqueue publish --addr localhost:9090 --topic orders "hello"
          \`\`\`
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: GoQueue ${{ env.VERSION }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ inputs.prerelease }}
          make_latest: ${{ inputs.mark_latest && 'true' || 'false' }}
          body_path: dist/RELEASE_NOTES.md
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

      - name: Set up Docker Buildx
        if: ${{ inputs.publish_docker }}
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: ${{ inputs.publish_docker }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        if: ${{ inputs.publish_docker }}
        id: docker_tags
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          SHORT_SHA="${GITHUB_SHA::7}"
          TAGS="${IMAGE}:${VERSION}"$'\n'"${IMAGE}:sha-${SHORT_SHA}"
          if [[ "${{ inputs.mark_latest }}" == "true" ]]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:latest"
          fi
          echo "tags<<EOF" >> "${GITHUB_OUTPUT}"
          echo "${TAGS}" >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"

      - name: Build and push broker image
        if: ${{ inputs.publish_docker }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/broker.Dockerfile
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
