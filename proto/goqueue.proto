syntax = "proto3";

package goqueue.v1;

option go_package = "github.com/2006t/goqueue/proto;goqueuev1";

service BrokerService {
  rpc Publish(PublishRequest) returns (PublishResponse);
  rpc Consume(ConsumeRequest) returns (stream ConsumeMessage);
}

message PublishRequest {
  string topic = 1;
  bytes payload = 2;
  string key = 3;
  int32 partition = 4;
}

message PublishResponse {
  int64 offset = 1;
  int32 partition = 2;
}

message ConsumeRequest {
  string topic = 1;
  string group = 2;
  int32 partition = 3;
}

message ConsumeMessage {
  int64 offset = 1;
  bytes payload = 2;
  int64 timestamp_unix_nano = 3;
  int32 partition = 4;
}
