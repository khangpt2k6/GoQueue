services:
  broker-1:
    build:
      context: .
      dockerfile: docker/broker.Dockerfile
    command: ["--tcp-addr=:9090", "--grpc-addr=:9095", "--metrics-addr=:2112", "--wal-path=/data/goqueue.wal", "--wal-sync-mode=interval", "--wal-sync-interval=250ms", "--node-id=broker-1", "--raft-role=leader", "--raft-leader-id=broker-1", "--raft-term=1"]
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
    ports:
      - "9091:9090"
      - "9191:9095"
      - "2113:2112"
    volumes:
      - broker1_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2112/readyz > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  broker-2:
    build:
      context: .
      dockerfile: docker/broker.Dockerfile
    command: ["--tcp-addr=:9090", "--grpc-addr=:9095", "--metrics-addr=:2112", "--wal-path=/data/goqueue.wal", "--wal-sync-mode=interval", "--wal-sync-interval=250ms", "--node-id=broker-2", "--raft-role=follower", "--raft-leader-id=broker-1", "--raft-term=1"]
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
    ports:
      - "9092:9090"
      - "9192:9095"
      - "2114:2112"
    volumes:
      - broker2_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2112/readyz > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  broker-3:
    build:
      context: .
      dockerfile: docker/broker.Dockerfile
    command: ["--tcp-addr=:9090", "--grpc-addr=:9095", "--metrics-addr=:2112", "--wal-path=/data/goqueue.wal", "--wal-sync-mode=interval", "--wal-sync-interval=250ms", "--node-id=broker-3", "--raft-role=follower", "--raft-leader-id=broker-1", "--raft-term=1"]
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
    ports:
      - "9093:9090"
      - "9193:9095"
      - "2115:2112"
    volumes:
      - broker3_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2112/readyz > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9099:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      broker-1:
        condition: service_healthy
      broker-2:
        condition: service_healthy
      broker-3:
        condition: service_healthy

  tempo:
    image: grafana/tempo:2.7.2
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./docker/tempo.yml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./docker/otel-collector.yml:/etc/otel/config.yaml:ro
    depends_on:
      - tempo

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    depends_on:
      - prometheus
      - tempo
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  broker1_data:
  broker2_data:
  broker3_data:
